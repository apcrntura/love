<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Love 🌸</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #1a001a 0%, #000 100%);
    font-family: Arial, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    text-align: center;
    z-index: 10;
}

.flower {
    font-size: 50px;
    transition: transform 0.1s linear;
}

.message {
    margin-top: 15px;
    font-size: 18px;
    opacity: 0.8;
}

.particle {
    position: absolute;
    font-size: 30px;
    animation: float 4s linear forwards;
    pointer-events: none;
}

@keyframes float {
    0% {
        opacity: 1;
        transform: translate(0, 0) scale(0.5);
    }
    100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.5);
    }
}

#surprise {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 3s ease;
    z-index: 20;
}
</style>
</head>

<body>

<img id="surprise" src="photo2.jpg">

<div class="container">
    <div id="flower" class="flower">🌱</div>
    <div id="text" class="message">Hold me to make me bloom 🌸</div>
</div>

<script>
let flower = document.getElementById("flower");
let text = document.getElementById("text");
let surprise = document.getElementById("surprise");

let size = 1;
let growing = false;
let fullyGrown = false;

function grow() {
    if (!growing || fullyGrown) return;

    size += 0.03;
    flower.style.transform = "scale(" + size + ")";

    if (size >= 3) {
        fullyGrown = true;
        flower.innerHTML = "🌸";
        text.innerHTML = "Watch what happens...";
        explodeFlowers();
        setTimeout(showSurprise, 4000);
        return;
    }

    requestAnimationFrame(grow);
}

function explodeFlowers() {
    for (let i = 0; i < 80; i++) {
        let petal = document.createElement("div");
        petal.className = "particle";
        petal.innerHTML = "🌸";

        let x = (Math.random() - 0.5) * window.innerWidth * 2;
        let y = (Math.random() - 0.5) * window.innerHeight * 2;

        petal.style.setProperty('--x', x + 'px');
        petal.style.setProperty('--y', y + 'px');

        petal.style.left = window.innerWidth / 2 + "px";
        petal.style.top = window.innerHeight / 2 + "px";

        document.body.appendChild(petal);

        setTimeout(() => {
            petal.remove();
        }, 4000);
    }
}

function showSurprise() {
    document.querySelector(".container").style.opacity = "0";
    surprise.style.opacity = "1";
}

flower.addEventListener("touchstart", () => {
    growing = true;
    grow();
});
flower.addEventListener("touchend", () => growing = false);
flower.addEventListener("mousedown", () => {
    growing = true;
    grow();
});
flower.addEventListener("mouseup", () => growing = false);
</script>

</body>
</html>
