<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You 🌸</title>

<style>
body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    background: radial-gradient(circle at center, #140014 0%, #000 100%);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: Arial, sans-serif;
    color: white;
    touch-action: manipulation;
}

.container {
    text-align: center;
    z-index: 10;
    transition: transform 0.2s ease, opacity 1s ease;
}

.flower {
    font-size: 60px;
    transition: transform 0.3s ease;
    user-select: none;
}

.message {
    margin-top: 15px;
    font-size: 18px;
    opacity: 0.85;
}

.particle {
    position: absolute;
    font-size: 30px;
    pointer-events: none;
    animation: scatter 3s ease-out forwards;
}

@keyframes scatter {
    0% {
        opacity: 1;
        transform: translate(0,0) scale(0.5);
    }
    100% {
        opacity: 0;
        transform: translate(var(--x), var(--y)) scale(1.8);
    }
}

#surprise {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 0;
    transition: opacity 2.5s ease;
    z-index: 20;
}
</style>
</head>

<body>

<img id="surprise" src="photo2.jpg">

<div class="container">
    <div id="flower" class="flower">🌱</div>
    <div id="text" class="message">Tap me 🌸</div>
</div>

<script>
let flower = document.getElementById("flower");
let text = document.getElementById("text");
let surprise = document.getElementById("surprise");
let container = document.querySelector(".container");

let taps = 0;
let maxTaps = 8;
let finished = false;

function handleTap() {

    if (finished) return;

    taps++;

    // heartbeat pulse
    container.style.transform = "scale(1.07)";
    setTimeout(() => container.style.transform = "scale(1)", 120);

    // grow flower
    let scale = 1 + taps * 0.25;
    flower.style.transform = "scale(" + scale + ")";

    // stages
    if (taps === 3) flower.innerHTML = "🌿";
    if (taps === 5) flower.innerHTML = "🌷";
    if (taps === 7) flower.innerHTML = "🌸";

    if (taps < maxTaps) {
        text.innerHTML = "Keep tapping...";
    }

    if (taps >= maxTaps) {
        finished = true;
        text.innerHTML = "For you ❤️";
        explodeFlowers();
        setTimeout(showSurprise, 3000);
    }
}

function explodeFlowers() {

    for (let i = 0; i < 200; i++) {

        let petal = document.createElement("div");
        petal.className = "particle";
        petal.innerHTML = "🌸";

        let x = (Math.random() - 0.5) * window.innerWidth * 2;
        let y = (Math.random() - 0.5) * window.innerHeight * 2;

        petal.style.setProperty('--x', x + 'px');
        petal.style.setProperty('--y', y + 'px');

        petal.style.left = window.innerWidth / 2 + "px";
        petal.style.top = window.innerHeight / 2 + "px";

        document.body.appendChild(petal);

        setTimeout(() => petal.remove(), 3000);
    }
}

function showSurprise() {
    container.style.opacity = "0";
    surprise.style.opacity = "1";
}

// IMPORTANT: Use touchstart + click for iOS reliability
flower.addEventListener("touchstart", function(e) {
    e.preventDefault();
    handleTap();
}, { passive: false });

flower.addEventListener("click", handleTap);

</script>

</body>
